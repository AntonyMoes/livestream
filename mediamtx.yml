# Minimal low-latency WebRTC streaming config

logLevel: info

# Timeouts and buffers - lower writeQueueSize reduces latency at cost of more "reader too slow" under load
readTimeout: 60s
writeTimeout: 60s
writeQueueSize: 256

# RTMP: OBS publishes here
rtmp: true
rtmpAddress: :1935

# WebRTC: Browser reads from here (~1s latency)
webrtc: true
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

# Disable HLS (WebRTC only)
hls: false

# RTSP: used by FFmpeg to publish re-encoded stream (AAC → Opus for WebRTC)
rtsp: true
rtspAddress: :8554

# Path "live" - OBS publishes here (RTMP, AAC). When ready, FFmpeg re-encodes to "live_webrtc" with Opus.
# Path "live_webrtc" - video copy + Opus audio; use this in the player (WebRTC requires Opus, not AAC).
# Low-latency + no drift: vsync drop + aresample async + small queues so delay doesn't grow over time.
paths:
  live:
    runOnReady: ffmpeg -fflags nobuffer+genpts -flags low_delay -thread_queue_size 1 -fps_mode drop -i rtmp://localhost:1935/live -c:v copy -af aresample=async=1 -c:a libopus -b:a 64k -application lowdelay -muxdelay 0 -muxpreload 0 -max_muxing_queue_size 512 -f rtsp rtsp://localhost:8554/live_webrtc
    runOnReadyRestart: yes
  live_webrtc: {}

# Required for remote viewers: use your public hostname so ICE candidates are reachable
# webrtcICEHostNAT1To1IPs: [YOUR_PUBLIC_IP]
