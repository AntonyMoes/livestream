server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Static frontend
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Proxy WebRTC/WHEP API to MediaMTX
    location /webrtc/ {
        proxy_pass http://mediamtx:8889/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        # MediaMTX returns Location: /path/whep/xxx; rewrite so PATCH goes to /webrtc/path/whep/xxx
        proxy_redirect /live/ /webrtc/live/;
        proxy_redirect /live_webrtc/ /webrtc/live_webrtc/;
    }
}
