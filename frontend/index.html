<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Stream</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .container {
      position: relative;
      width: 100%;
      max-width: 960px;
    }
    video {
      width: 100%;
      display: block;
      background: #1a1a1a;
    }
    #status {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 14px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 14px;
      border-radius: 4px;
    }
    #debug-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 200px;
      background: rgba(0,0,0,0.9);
      color: #0f0;
      font: 11px/1.4 monospace;
      overflow: auto;
      padding: 8px;
      border-top: 1px solid #333;
    }
    #debug-panel summary { cursor: pointer; padding: 4px 0; }
    #debug-panel .debug-line { margin: 2px 0; word-break: break-all; }
    #debug-panel .debug-kv { margin: 2px 0; }
  </style>
</head>
<body>
  <div class="container">
    <video id="video" autoplay playsinline muted controls></video>
    <div id="status">Connecting…</div>
  </div>
  <details id="debug-panel">
    <summary>Debug</summary>
    <div class="debug-kv">connState: <span id="debug-connState">-</span></div>
    <div class="debug-kv">iceState: <span id="debug-iceState">-</span></div>
    <div class="debug-kv">gatherState: <span id="debug-gatherState">-</span></div>
    <div class="debug-kv">stats: <span id="debug-stats">-</span></div>
    <div class="debug-kv">video: <span id="debug-video">-</span></div>
    <div id="debug"></div>
  </details>
  <script type="module" src="player.js"></script>
</body>
</html>
