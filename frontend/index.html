<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Stream</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .container {
      position: relative;
      width: 100%;
      max-width: 960px;
    }
    video {
      width: 100%;
      display: block;
      background: #1a1a1a;
    }
    #status {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 14px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 14px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <video id="video" autoplay playsinline controls></video>
    <div id="status">Connecting…</div>
  </div>
  <script src="webrtc.js"></script>
</body>
</html>
